apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-runner-set
  namespace: github-runners
  labels:
    app: arc-runner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arc-runner
  template:
    metadata:
      labels:
        app: arc-runner
    spec:
      serviceAccountName: github-runner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: runner
          image: summerwind/actions-runner:latest@sha256:7f0e6e20f90d30c12a07192c0f9712a9c6f4c7e6e5e8b6f1e4a6c8d2e0f4a6c8d
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            limits:
              cpu: "2000m"
              memory: "4Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: RUNNER_LABELS
              value: "secure-runner,ssf"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: work
              mountPath: /runner/_work
      volumes:
        - name: tmp
          emptyDir: {}
        - name: work
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: runner-hpa
  namespace: github-runners
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arc-runner-set
  minReplicas: 1
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: runner-pdb
  namespace: github-runners
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: arc-runner
