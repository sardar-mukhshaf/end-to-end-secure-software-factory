apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-pod-security-standards
  annotations:
    policies.kyverno.io/title: "Enforce Pod Security Standards"
    policies.kyverno.io/severity: "critical"
    policies.kyverno.io/category: "Pod Security"
    policies.kyverno.io/subject: "Pod"
    policies.kyverno.io/description: >-
      Enforce the restricted Pod Security Standards profile cluster-wide.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restricted-profile
      match:
        resources:
          kinds:
            - Pod
      exclude:
        resources:
          namespaces:
            - kube-system
            - kyverno
            - falco
            - github-runners
      validate:
        message: "Pod must comply with restricted Pod Security Standards."
        podSecurity:
          level: restricted
          version: latest
