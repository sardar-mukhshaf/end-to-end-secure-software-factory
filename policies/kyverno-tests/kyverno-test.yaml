apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ssf-policies-test
policies:
  - ../../kubernetes/kyverno/cluster-policies/verify-image-signatures.yaml
  - ../../kubernetes/kyverno/cluster-policies/restrict-image-registries.yaml
  - ../../kubernetes/kyverno/cluster-policies/require-resource-limits.yaml
  - ../../kubernetes/kyverno/cluster-policies/require-non-root.yaml
  - ../../kubernetes/kyverno/cluster-policies/disallow-host-path.yaml
  - ../../kubernetes/kyverno/cluster-policies/disallow-privilege-escalation.yaml
  - ../../kubernetes/kyverno/cluster-policies/restrict-external-ips.yaml
  - ../../kubernetes/kyverno/cluster-policies/enforce-pod-security-standards.yaml
resources:
  - resources/pass-pod.yaml
  - resources/fail-pod.yaml
results:
  - policy: verify-image-signatures
    rule: verify-cosign-signature
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: verify-image-signatures
    rule: verify-cosign-signature
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: restrict-image-registries
    rule: validate-registries
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: restrict-image-registries
    rule: validate-registries
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: require-resource-limits
    rule: validate-limits
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: require-resource-limits
    rule: validate-limits
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: require-non-root
    rule: check-security-context
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: require-non-root
    rule: check-security-context
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: disallow-host-path
    rule: check-host-path
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: disallow-host-path
    rule: check-host-path
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: disallow-privilege-escalation
    rule: check-priv-esc
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: disallow-privilege-escalation
    rule: check-priv-esc
    resource: fail-pod
    kind: Pod
    result: fail
  - policy: enforce-pod-security-standards
    rule: restricted-profile
    resource: pass-pod
    kind: Pod
    result: pass
  - policy: enforce-pod-security-standards
    rule: restricted-profile
    resource: fail-pod
    kind: Pod
    result: fail
